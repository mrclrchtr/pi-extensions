name: Release

on:
  push:
    branches:
      - main

env:
  REQUIRED_CHECKS: verify,actionlint,commit-messages

permissions:
  contents: read
  checks: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      checks: read
      id-token: write

    steps:
      - name: Wait for required checks
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          IFS=',' read -r -a required_checks <<< "$REQUIRED_CHECKS"
          deadline=$((SECONDS + 600))

          while (( SECONDS < deadline )); do
            mapfile -t check_runs < <(
              gh api \
                -H "Accept: application/vnd.github+json" \
                "/repos/$REPO/commits/$SHA/check-runs?per_page=100" \
                --jq '.check_runs[] | [.name, .status, (.conclusion // "")] | @tsv'
            )

            declare -A statuses=()
            declare -A conclusions=()

            for run in "${check_runs[@]}"; do
              IFS=$'\t' read -r name status conclusion <<< "$run"
              statuses["$name"]="$status"
              conclusions["$name"]="$conclusion"
            done

            pending=()
            failed=()

            for name in "${required_checks[@]}"; do
              status="${statuses[$name]:-missing}"
              conclusion="${conclusions[$name]:-}"

              if [[ "$status" == "completed" ]]; then
                if [[ "$conclusion" != "success" ]]; then
                  failed+=("$name ($conclusion)")
                fi
                continue
              fi

              pending+=("$name ($status)")
            done

            if ((${#failed[@]} > 0)); then
              echo "Required checks failed: ${failed[*]}"
              exit 1
            fi

            if ((${#pending[@]} == 0)); then
              echo "All required checks passed."
              break
            fi

            echo "Waiting for checks: ${pending[*]}"
            sleep 15
          done

          if (( SECONDS >= deadline )); then
            echo "Timed out waiting for required checks: $REQUIRED_CHECKS"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up workspace dependencies
        uses: ./.github/actions/setup-pnpm

      - name: Verify package
        run: pnpm verify

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
